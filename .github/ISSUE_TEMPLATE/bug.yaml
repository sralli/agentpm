name: Bug Report
description: Report a bug in agendum
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
  - type: input
    id: version
    attributes:
      label: agendum version
      description: Output of `agendum --version` or `pip show agendum`
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Code
        - Claude Desktop
        - Cursor
        - CLI (standalone)
        - Other
